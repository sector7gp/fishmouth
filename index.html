<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishmouth - Generador de Plantillas de Corte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input,
        select {
            background: rgba(15, 23, 42, 0.8) !important;
            border: 1px solid rgba(148, 163, 184, 0.2) !important;
            color: white !important;
        }

        input:focus,
        select:focus {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2) !important;
        }
    </style>
</head>

<body class="bg-[#0f172a] text-slate-200 min-h-screen">
    <div class="flex flex-col lg:flex-row h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-full lg:w-[400px] glass p-6 overflow-y-auto shadow-2xl z-10">
            <div class="flex items-center gap-3 mb-8">
                <div class="p-2 bg-blue-600 rounded-lg">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.12a2 2 0 00-1.022.547l-2.387 2.387a2 2 0 00.733 3.324l1.636.545a2 2 0 001.264-.09l12.161-4.864a2 2 0 00.733-3.324l-2.387-2.387zM15 11l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">
                    Fishmouth</h1>
            </div>

            <form id="calc-form" class="space-y-6">
                <!-- Tubo a Cortar (Branch) -->
                <div>
                    <label class="block text-sm font-semibold text-slate-400 mb-2">Tubo a Cortar (Branch)</label>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <span class="text-xs text-slate-500 block mb-1">Forma</span>
                            <select id="branch-shape"
                                class="w-full p-2.5 rounded-lg outline-none transition-all cursor-pointer">
                                <option value="round">Redondo</option>
                                <option value="square">Cuadrado</option>
                            </select>
                        </div>
                        <div>
                            <span class="text-xs text-slate-500 block mb-1">D.E / Ancho (mm)</span>
                            <input type="number" id="branch-dim" value="50" step="0.1"
                                class="w-full p-2.5 rounded-lg outline-none transition-all">
                        </div>
                    </div>
                </div>

                <!-- Tubo Base (Header) -->
                <div>
                    <label class="block text-sm font-semibold text-slate-400 mb-2">Tubo Base (Header)</label>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <span class="text-xs text-slate-500 block mb-1">Forma</span>
                            <select id="header-shape"
                                class="w-full p-2.5 rounded-lg outline-none transition-all cursor-pointer">
                                <option value="round">Redondo</option>
                                <option value="square">Cuadrado</option>
                            </select>
                        </div>
                        <div>
                            <span class="text-xs text-slate-500 block mb-1">D.E / Ancho (mm)</span>
                            <input type="number" id="header-dim" value="50" step="0.1"
                                class="w-full p-2.5 rounded-lg outline-none transition-all">
                        </div>
                    </div>
                </div>

                <!-- Ángulo -->
                <div>
                    <label class="block text-sm font-semibold text-slate-400 mb-2">Ángulo de Intersección (°)</label>
                    <input type="range" id="angle-range" min="10" max="90" value="90"
                        class="w-full h-2 rounded-lg appearance-none cursor-pointer mb-2 bg-slate-700 accent-blue-500">
                    <input type="number" id="angle" value="90" min="10" max="90"
                        class="w-full p-2.5 rounded-lg outline-none transition-all">
                </div>

                <!-- Botones -->
                <div class="pt-4 space-y-3">
                    <button type="button" id="btn-export"
                        class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl transition-all shadow-lg shadow-blue-500/20 active:scale-[0.98]">
                        Generar PDF para Imprimir (1:1)
                    </button>
                    <p class="text-[10px] text-center text-slate-500 italic">
                        El PDF se genera en tamaño A4 con escala real 1:1.
                    </p>
                </div>
            </form>

            <footer class="mt-auto pt-10 text-xs text-slate-600">
                &copy; 2026 Fishmouth Tool &bull; Ing. Mecánica + Frontend
            </footer>
        </aside>

        <!-- Preview Area -->
        <main class="flex-1 relative flex flex-col p-8 overflow-hidden">
            <header class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold text-slate-300">Desarrollo Plano (Unwrapped)</h2>
                <div id="status-badge"
                    class="px-3 py-1 bg-green-500/10 text-green-400 text-xs font-medium rounded-full border border-green-500/20">
                    Sincronizado
                </div>
            </header>

            <div
                class="flex-1 bg-[#0a0f1d] rounded-2xl border border-slate-800 shadow-inner overflow-hidden relative group">
                <canvas id="main-canvas" class="w-full h-full cursor-crosshair"></canvas>

                <!-- Info Overlay -->
                <div class="absolute bottom-6 left-6 flex gap-6">
                    <div class="glass px-4 py-2 rounded-lg">
                        <div class="text-[10px] text-slate-500 uppercase tracking-wider font-bold">Perímetro Total</div>
                        <div id="info-perimeter" class="text-lg font-bold text-white">0.00 mm</div>
                    </div>
                    <div class="glass px-4 py-2 rounded-lg">
                        <div class="text-[10px] text-slate-500 uppercase tracking-wider font-bold">Desplazamiento Máx.
                        </div>
                        <div id="info-height" class="text-lg font-bold text-white">0.00 mm</div>
                    </div>
                </div>
            </div>

            <div class="absolute right-12 top-1/2 -translate-y-1/2 flex flex-col gap-4">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-red-500 rounded-full"></div>
                    <span class="text-xs text-slate-400">Pico Máx / Lomo</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-blue-500 rounded-full"></div>
                    <span class="text-xs text-slate-400">Extremos / Cierres</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-slate-500 rounded-full"></div>
                    <span class="text-xs text-slate-400">Ejes 90°</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Script loading in order for global dependencies -->
    <script src="js/math.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/pdf.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
